<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>選擇排序動畫</title>

<style>
body{
    text-align:center;
    font-family:Arial;
}

#container{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    height:300px;
    margin-top:40px;
}

.bar{
    width:30px;
    margin:3px;
    background:steelblue;
}

.active{
    background:red;
}

.sorted{
    background:green;
}

.min{
    background:orange;
}
</style>
</head>

<body>

<h2>選擇排序動畫</h2>
<label for="arraySize">元素個數：</label>
<input type="number" id="arraySize" value="20" min="1" max="50">
<button onclick="generateArray()">生成數組</button>
<button onclick="startSort()">開始排序</button>

<div id="container"></div>

<script>

let array = [];
let container = document.getElementById("container");

function generateArray(){
    let size = parseInt(document.getElementById("arraySize").value);
    if(size < 1 || size > 50) {
        alert("請輸入 1 到 50 之間的數字");
        return;
    }
    container.innerHTML="";
    array=[];

    for(let i=0;i<size;i++){
        let value = Math.floor(Math.random()*200)+20;
        array.push(value);

        let bar=document.createElement("div");
        bar.classList.add("bar");
        bar.style.height=value+"px";

        container.appendChild(bar);
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

async function startSort(){

    let bars=document.getElementsByClassName("bar");

    for(let i=0;i<array.length;i++){

        let minIdx = i;
        bars[minIdx].classList.add("min");

        for(let j=i+1;j<array.length;j++){

            bars[j].classList.add("active");
            await sleep(150);

            if(array[j] < array[minIdx]){
                bars[minIdx].classList.remove("min");
                minIdx = j;
                bars[minIdx].classList.add("min");
            }

            bars[j].classList.remove("active");
        }

        if(minIdx !== i){
            // Swap
            let temp=array[i];
            array[i]=array[minIdx];
            array[minIdx]=temp;

            bars[i].style.height=array[i]+"px";
            bars[minIdx].style.height=array[minIdx]+"px";
        }

        bars[minIdx].classList.remove("min");
        bars[i].classList.add("sorted");
    }
}

generateArray();
</script>
</body>
