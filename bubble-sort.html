<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣泡排序法互動教學</title>
    <style>
        :root {
            --primary: #3498db;
            --accent: #e74c3c;
            --success: #2ecc71;
            --bg: #f4f7f6;
        }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 視覺化圖表區域 */
        #visualizer { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 8px; margin: 20px 0; border-bottom: 2px solid #ddd; }
        .bar { width: 40px; background: var(--primary); color: white; text-align: center; border-radius: 4px 4px 0 0; transition: transform 0.2s, background 0.2s; font-size: 14px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; }
        .comparing { background: var(--accent) !important; transform: scale(1.1); }
        .sorted { background: var(--success) !important; }

        /* 控制區 */
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #startBtn { background: var(--primary); color: white; }
        #pauseBtn { background: #f39c12; color: white; }
        #resetBtn { background: #95a5a6; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 教學資訊 */
        .info-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; }
        .status-msg { font-size: 1.2em; font-weight: bold; color: var(--accent); text-align: center; height: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>氣泡排序法 (Bubble Sort) 互動教學</h1>
    
    <div id="visualizer"></div>
    <div class="status-msg" id="status">點擊「開始」觀察排序過程</div>

    <div class="controls">
        <button id="startBtn" onclick="startSort()">開始排序</button>
        <button id="pauseBtn" onclick="togglePause()">暫停</button>
        <button id="resetBtn" onclick="resetArray()">重置數列</button>
    </div>

    <div class="info-section">
        <h3>1. 操作原理</h3>
        <p>從第一個元素開始，重複地比較相鄰的兩個元素。如果順序錯誤（前大後小）就交換。每一輪結束，最大的數字會像氣泡一樣「浮」到最右端。</p>
        
        <h3>2. 複雜度分析</h3>
        <ul>
            <li><strong>平均與最壞時間複雜度：</strong> $O(n^2)$</li>
            <li><strong>最佳時間複雜度：</strong> $O(n)$ (當數列已排序)</li>
            <li><strong>空間複雜度：</strong> $O(1)$ (原地排序)</li>
        </ul>
    </div>
</div>

<script>
    let array = [];
    const container = document.getElementById('visualizer');
    const statusText = document.getElementById('status');
    let isPaused = false;
    let isRunning = false;

    // 初始化隨機數列
    function resetArray() {
        array = Array.from({length: 10}, () => Math.floor(Math.random() * 50) + 10);
        isPaused = false;
        isRunning = false;
        document.getElementById('pauseBtn').innerText = "暫停";
        document.getElementById('startBtn').disabled = false;
        statusText.innerText = "數列已重置";
        render();
    }

    function render(comparingIndices = [], sortedIndices = []) {
        container.innerHTML = '';
        array.forEach((val, i) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${val * 3}px`;
            bar.innerText = val;
            if (comparingIndices.includes(i)) bar.classList.add('comparing');
            if (sortedIndices.includes(i)) bar.classList.add('sorted');
            container.appendChild(bar);
        });
    }

    // 等待函式，支援暫停邏輯
    function sleep(ms) {
        return new Promise(resolve => {
            const check = () => {
                if (!isPaused) resolve();
                else setTimeout(check, 100);
            };
            setTimeout(check, ms);
        });
    }

    async function startSort() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        
        let n = array.length;
        let sortedIndices = [];

        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                if (!isRunning) return; // 處理重置
                
                statusText.innerText = `正在比較索引 ${j} (${array[j]}) 與 ${j+1} (${array[j+1]})`;
                render([j, j + 1], sortedIndices);
                await sleep(600);

                if (array[j] > array[j + 1]) {
                    statusText.innerText = `交換 ${array[j]} 與 ${array[j+1]}`;
                    [array[j], array[j + 1]] = [array[j + 1], array[j]];
                    render([j, j + 1], sortedIndices);
                    await sleep(400);
                }
            }
            // 每一輪結束，確定一個最大值
            sortedIndices.push(n - 1 - i);
        }
        
        statusText.innerText = "排序完成！所有氣泡已定位。";
        render([], Array.from({length: n}, (_, i) => i));
        isRunning = false;
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerText = isPaused ? "繼續" : "暫停";
        statusText.innerText = isPaused ? "程式已暫停" : "繼續排序...";
    }

    resetArray();
</script>

</body>
</html>
